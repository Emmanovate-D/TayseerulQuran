<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <title>Manage Courses - Super Admin</title>
    <meta name="robots" content="noindex, follow" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="shortcut icon" type="image/x-icon" href="assets/images/favicon.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="stylesheet" href="assets/css/plugins/magnific-popup.css">

</head>

<body>

    <div class="main-wrapper main-wrapper-02">

        <!-- Login Header Start -->
        <div class="section login-header">
            <div class="login-header-wrapper navbar navbar-expand">
                <div class="login-header-logo">
                    <a href="super-admin-dashboard.html"><img src="assets/images/logo-icon.png" alt="Logo"></a>
                </div>
                <div class="login-header-action ml-auto">
                    <a class="action author" href="#">
                        <img src="assets/images/author/author-07.jpg" alt="Author">
                    </a>
                    <div class="dropdown">
                        <button class="action more" data-bs-toggle="dropdown">
                            <span></span>
                            <span></span>
                            <span></span>
                        </button>
                        <ul class="dropdown-menu">
                            <li><a href="super-admin-dashboard.html"><i class="icofont-home"></i> Dashboard</a></li>
                            <li><a href="login.html"><i class="icofont-logout"></i> Sign Out</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Courses Admin Start -->
        <div class="section overflow-hidden position-relative" id="wrapper">
            <div class="sidebar-wrapper">
                <div class="menu-list">
                    <a href="super-admin-dashboard.html" title="Dashboard"><img src="assets/images/menu-icon/icon-3.png" alt="Icon"></a>
                    <a class="active" href="super-admin-courses.html" title="Courses" data-permission="view_courses"><img src="assets/images/menu-icon/icon-1.png" alt="Icon"></a>
                    <a href="super-admin-students.html" title="Students" data-permission="view_students"><img src="assets/images/menu-icon/icon-2.png" alt="Icon"></a>
                    <a href="super-admin-tutors.html" title="Tutors" data-permission="view_tutors"><img src="assets/images/menu-icon/icon-4.png" alt="Icon"></a>
                    <a href="super-admin-payments.html" title="Payments" data-permission="view_payments"><img src="assets/images/menu-icon/icon-5.png" alt="Icon"></a>
                    <a href="super-admin-roles.html" title="Admin Roles" data-role="super_admin"><img src="assets/images/menu-icon/icon-1.png" alt="Icon"></a>
                    <a href="super-admin-blog.html" title="Blog" data-permission="view_blog_posts"><img src="assets/images/menu-icon/icon-2.png" alt="Icon"></a>
                    <a href="super-admin-content.html" title="Content" data-permission="view_all_pages"><img src="assets/images/menu-icon/icon-3.png" alt="Icon"></a>
                </div>
            </div>

            <div class="page-content-wrapper py-0">
                <div class="nav flex-column nav-pills admin-tab-menu">
                    <a href="super-admin-dashboard.html">Dashboard</a>
                    <a href="super-admin-courses.html" class="active" data-permission="view_courses">Courses</a>
                    <a href="super-admin-students.html" data-permission="view_students">Students</a>
                    <a href="super-admin-tutors.html" data-permission="view_tutors">Tutors</a>
                    <a href="super-admin-payments.html" data-permission="view_payments">Payments</a>
                    <a href="super-admin-roles.html" data-role="super_admin">Admin Roles</a>
                </div>

                <div class="main-content-wrapper">
                    <div class="container-fluid">
                        <div class="admin-top-bar flex-wrap mb-4">
                            <div>
                                <h3 class="title mb-2">Course Management</h3>
                                <p class="text-muted">Add, edit, or delete courses</p>
                            </div>
                            <button class="btn btn-sm btn-primary px-3 py-2 small" data-bs-toggle="modal" data-bs-target="#addCourseModal" data-permission="add_course" style="font-size: 0.75rem;">
                                <i class="icofont-plus me-1"></i> Add New Course
                            </button>
                        </div>

                        <!-- Courses Table -->
                        <div class="card border-0 shadow-sm">
                            <div class="card-body">
                                <div class="table-responsive">
                                    <table class="table table-hover" id="coursesTable">
                                        <thead>
                                            <tr>
                                                <th>ID</th>
                                                <th>Course Title</th>
                                                <th>Instructor</th>
                                                <th>Category</th>
                                                <th>Price</th>
                                                <th>Students</th>
                                                <th>Status</th>
                                                <th>Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td colspan="8" class="text-center">
                                                    <div class="spinner-border text-primary" role="status">
                                                        <span class="visually-hidden">Loading...</span>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Course Modal -->
        <div class="modal fade" id="addCourseModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Add New Course</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addCourseForm">
                            <div class="mb-3">
                                <label class="form-label">Course Title</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" rows="4" required></textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Category</label>
                                    <select class="form-control" required>
                                        <option>Web Development</option>
                                        <option>Data Science</option>
                                        <option>Design</option>
                                        <option>Marketing</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Price ($)</label>
                                    <input type="number" class="form-control" step="0.01" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Assign Instructor</label>
                                <select class="form-control" required>
                                    <option>John Smith</option>
                                    <option>Sarah Johnson</option>
                                    <option>Emily Davis</option>
                                </select>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-sm btn-secondary px-3 py-2 small" data-bs-dismiss="modal" style="font-size: 0.75rem;">Cancel</button>
                        <button type="button" class="btn btn-sm btn-primary px-3 py-2 small" onclick="saveCourse()" style="font-size: 0.75rem;">Save Course</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Course Modal -->
        <div class="modal fade" id="editCourseModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Edit Course</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editCourseForm">
                            <div class="mb-3">
                                <label class="form-label">Course Title</label>
                                <input type="text" class="form-control" value="Complete Web Development Bootcamp" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" rows="4" required>Learn web development from scratch</textarea>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Category</label>
                                    <select class="form-control" required>
                                        <option>Web Development</option>
                                        <option>Data Science</option>
                                        <option>Design</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Price ($)</label>
                                    <input type="number" class="form-control" value="99.00" step="0.01" required>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-sm btn-secondary px-3 py-2 small" data-bs-dismiss="modal" style="font-size: 0.75rem;">Cancel</button>
                        <button type="button" class="btn btn-sm btn-primary px-3 py-2 small" onclick="updateCourse()" style="font-size: 0.75rem;">Update Course</button>
                    </div>
                </div>
            </div>
        </div>

        <a href="#" class="back-to-top">
            <i class="icofont-simple-up"></i>
        </a>

    </div>

    <!-- jQuery from CDN -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <script>
        if (typeof jQuery === 'undefined') {
            const script = document.createElement('script');
            script.src = 'assets/js/vendor/jquery-3.5.1.min.js';
            document.head.appendChild(script);
        }
    </script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
    <script src="assets/js/vendor/modernizr-3.11.2.min.js"></script>
    <script>
        const pluginsScript = document.createElement('script');
        pluginsScript.src = 'assets/js/plugins.min.js';
        pluginsScript.onerror = function() {
            console.warn('plugins.min.js not found, continuing without it');
        };
        document.head.appendChild(pluginsScript);
    </script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/role-access-control.js"></script>
    <script>
        localStorage.setItem('userRole', 'super_admin');
        
        let currentEditCourseId = null;
        
        function showMessage(message, type = 'success') {
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            const messageHtml = `<div class="alert ${alertClass} alert-dismissible fade show" role="alert" style="position: fixed; top: 20px; right: 20px; z-index: 9999; min-width: 300px;">
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>`;
            $('body').append(messageHtml);
            setTimeout(() => $('.alert').fadeOut(), 5000);
        }
        
        // Load courses from API
        async function loadCourses() {
            try {
                if (typeof API === 'undefined' || typeof API.course === 'undefined') {
                    console.error('API not loaded');
                    return;
                }
                
                console.log('Loading courses from API...');
                const response = await API.course.getAll();
                const tbody = $('#coursesTable tbody');
                
                if (response.success && response.data) {
                    const courses = response.data.courses || response.data || [];
                    
                    if (courses.length === 0) {
                        tbody.html('<tr><td colspan="8" class="text-center text-muted">No courses found. Create your first course!</td></tr>');
                        return;
                    }
                    
                    let html = '';
                    courses.forEach(course => {
                        const instructor = course.tutor?.user ? `${course.tutor.user.firstName} ${course.tutor.user.lastName}` : 'Unassigned';
                        const price = course.price ? '$' + parseFloat(course.price).toFixed(2) : 'Free';
                        const status = course.isPublished ? '<span class="badge bg-success">Published</span>' : '<span class="badge bg-warning">Draft</span>';
                        const students = course.enrolledStudents || 0;
                        
                        html += `
                            <tr data-course-id="${course.id}">
                                <td>${course.id}</td>
                                <td>${course.title || 'Untitled'}</td>
                                <td>${instructor}</td>
                                <td>${course.category || 'General'}</td>
                                <td>${price}</td>
                                <td>${students}</td>
                                <td>${status}</td>
                                <td>
                                    <button class="btn btn-sm btn-info px-2 py-1" data-bs-toggle="modal" data-bs-target="#editCourseModal" data-course-id="${course.id}" style="font-size: 0.7rem;">
                                        <i class="icofont-edit"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger px-2 py-1" onclick="deleteCourse(${course.id})" style="font-size: 0.7rem;">
                                        <i class="icofont-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                    
                    tbody.html(html);
                } else {
                    tbody.html('<tr><td colspan="8" class="text-center text-muted">Failed to load courses</td></tr>');
                }
            } catch (error) {
                console.error('Error loading courses:', error);
                $('#coursesTable tbody').html(`<tr><td colspan="8" class="text-center text-danger">Error loading courses: ${error.message || 'Unknown error'}</td></tr>`);
            }
        }
        
        // Load tutors for instructor dropdown
        async function loadTutors() {
            try {
                if (typeof API === 'undefined' || typeof API.tutor === 'undefined') {
                    return;
                }
                
                const response = await API.tutor.getAll();
                const select = $('#addCourseForm select').last(); // Last select is instructor
                const editSelect = $('#editCourseForm select').last();
                
                if (response.success && response.data) {
                    const tutors = response.data.tutors || response.data || [];
                    let options = '<option value="">Select Instructor</option>';
                    
                    tutors.forEach(tutor => {
                        const name = tutor.user ? `${tutor.user.firstName} ${tutor.user.lastName}` : 'Unknown';
                        options += `<option value="${tutor.id}">${name}</option>`;
                    });
                    
                    select.html(options);
                    editSelect.html(options);
                }
            } catch (error) {
                console.error('Error loading tutors:', error);
            }
        }
        
        // Save new course
        async function saveCourse() {
            try {
                if (typeof API === 'undefined' || typeof API.course === 'undefined') {
                    showMessage('API not loaded. Please refresh the page.', 'error');
                    return;
                }
                
                const form = $('#addCourseForm');
                const title = form.find('input[type="text"]').first().val();
                const description = form.find('textarea').val();
                const category = form.find('select').first().val();
                const price = form.find('input[type="number"]').val();
                const tutorId = form.find('select').last().val();
                
                if (!title || !description) {
                    showMessage('Please fill in all required fields', 'error');
                    return;
                }
                
                const courseData = {
                    title: title.trim(),
                    description: description.trim(),
                    category: category || 'General',
                    price: price ? parseFloat(price) : 0,
                    tutorId: tutorId ? parseInt(tutorId) : null,
                    isPublished: true,
                    isActive: true
                };
                
                console.log('Creating course:', courseData);
                const response = await API.course.create(courseData);
                
                if (response.success) {
                    showMessage('Course created successfully!');
                    $('#addCourseModal').modal('hide');
                    form[0].reset();
                    loadCourses(); // Refresh the list
                } else {
                    showMessage(response.message || 'Failed to create course', 'error');
                }
            } catch (error) {
                console.error('Error creating course:', error);
                showMessage(error.message || 'Failed to create course. Please try again.', 'error');
            }
        }
        
        // Update course
        async function updateCourse() {
            if (!currentEditCourseId) {
                showMessage('Course ID not found for update', 'error');
                return;
            }
            
            try {
                if (typeof API === 'undefined' || typeof API.course === 'undefined') {
                    showMessage('API not loaded. Please refresh the page.', 'error');
                    return;
                }
                
                const form = $('#editCourseForm');
                const title = form.find('input[type="text"]').first().val();
                const description = form.find('textarea').val();
                const category = form.find('select').first().val();
                const price = form.find('input[type="number"]').val();
                
                if (!title || !description) {
                    showMessage('Please fill in all required fields', 'error');
                    return;
                }
                
                const courseData = {
                    title: title.trim(),
                    description: description.trim(),
                    category: category || 'General',
                    price: price ? parseFloat(price) : 0
                };
                
                const response = await API.course.update(currentEditCourseId, courseData);
                
                if (response.success) {
                    showMessage('Course updated successfully!');
                    $('#editCourseModal').modal('hide');
                    loadCourses(); // Refresh the list
                } else {
                    showMessage(response.message || 'Failed to update course', 'error');
                }
            } catch (error) {
                console.error('Error updating course:', error);
                showMessage(error.message || 'Failed to update course. Please try again.', 'error');
            }
        }
        
        // Delete course
        async function deleteCourse(id) {
            if (!confirm('Are you sure you want to delete this course? This action cannot be undone.')) {
                return;
            }
            
            try {
                if (typeof API === 'undefined' || typeof API.course === 'undefined') {
                    showMessage('API not loaded. Please refresh the page.', 'error');
                    return;
                }
                
                const response = await API.course.delete(id);
                
                if (response.success) {
                    showMessage('Course deleted successfully!');
                    $(`tr[data-course-id="${id}"]`).fadeOut(300, function() {
                        $(this).remove();
                        if ($('#coursesTable tbody tr').length === 0) {
                            loadCourses();
                        }
                    });
                } else {
                    showMessage(response.message || 'Failed to delete course', 'error');
                }
            } catch (error) {
                console.error('Error deleting course:', error);
                showMessage(error.message || 'Failed to delete course. Please try again.', 'error');
            }
        }
        
        // Set edit course ID when edit modal opens
        $(document).on('click', '[data-bs-target="#editCourseModal"]', async function() {
            const courseId = $(this).data('course-id');
            currentEditCourseId = courseId;
            
            try {
                const response = await API.course.getById(courseId);
                if (response.success && response.data) {
                    const course = response.data.course;
                    const form = $('#editCourseForm');
                    form.find('input[type="text"]').first().val(course.title);
                    form.find('textarea').val(course.description);
                    form.find('select').first().val(course.category);
                    form.find('input[type="number"]').val(course.price);
                } else {
                    showMessage(response.message || 'Failed to load course for editing', 'error');
                }
            } catch (error) {
                console.error('Error loading course for edit:', error);
                showMessage(error.message || 'Failed to load course for editing. Please try again.', 'error');
            }
        });
        
        // Load courses and tutors on page load
        $(document).ready(function() {
            if (typeof jQuery === 'undefined') {
                setTimeout(function() {
                    if (typeof jQuery !== 'undefined') {
                        loadCourses();
                        loadTutors();
                    }
                }, 1000);
            } else {
                loadCourses();
                loadTutors();
            }
        });
    </script>

</body>

</html>
